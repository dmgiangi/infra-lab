---
- name: Prepare Linux nodes for Kubernetes
  hosts: kube_cluster
  gather_facts: true

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name: "{{ kubernetes_base_packages }}"
        state: present
        update_cache: true

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove active swap entries from fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Persist required kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/kubernetes.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          {% for module in kubernetes_kernel_modules %}
          {{ module }}
          {% endfor %}

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: "{{ kubernetes_kernel_modules }}"

    - name: Configure Kubernetes sysctl values
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop: "{{ kubernetes_sysctl_values | dict2items }}"
