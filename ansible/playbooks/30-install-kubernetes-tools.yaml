---
- name: Install container runtime and Kubernetes tools
  hosts: kube_cluster
  gather_facts: true

  tasks:
    - name: Install container runtime package
      ansible.builtin.apt:
        name: "{{ container_runtime_package }}"
        state: present
        update_cache: true

    - name: Create containerd configuration directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check whether containerd configuration exists
      ansible.builtin.stat:
        path: "{{ containerd_config_path }}"
      register: containerd_config

    - name: Generate default containerd configuration
      ansible.builtin.command: containerd config default
      changed_when: false
      register: containerd_default_config
      when: not containerd_config.stat.exists

    - name: Write default containerd configuration
      ansible.builtin.copy:
        dest: "{{ containerd_config_path }}"
        owner: root
        group: root
        mode: "0644"
        content: "{{ containerd_default_config.stdout }}"
      when: not containerd_config.stat.exists
      notify: Restart containerd

    - name: Configure containerd to use systemd cgroups
      ansible.builtin.replace:
        path: "{{ containerd_config_path }}"
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: Restart containerd

    - name: Enable and start containerd
      ansible.builtin.systemd_service:
        name: "{{ containerd_service_name }}"
        enabled: true
        state: started

    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Kubernetes apt repository signing key
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_minor_version }}/deb/Release.key"
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        owner: root
        group: root
        mode: "0644"

    - name: Convert Kubernetes apt repository key to gpg keyring
      ansible.builtin.command:
        cmd: gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /etc/apt/keyrings/kubernetes-apt-keyring.asc
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Configure Kubernetes apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_minor_version }}/deb/ /"
        filename: kubernetes
        state: present
        update_cache: true

    - name: Install Kubernetes node tools
      ansible.builtin.apt:
        name: "{{ kubernetes_packages }}"
        state: present

    - name: Hold Kubernetes packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: "{{ kubernetes_packages }}"

    - name: Enable kubelet
      ansible.builtin.systemd_service:
        name: kubelet
        enabled: true

  handlers:
    - name: Restart containerd
      ansible.builtin.systemd_service:
        name: "{{ containerd_service_name }}"
        state: restarted
