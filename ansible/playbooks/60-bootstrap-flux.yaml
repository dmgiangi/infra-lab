---
- name: Bootstrap Flux from GitHub
  hosts: localhost
  gather_facts: false
  become: false

  tasks:
    - name: Check flux CLI availability
      ansible.builtin.command: flux --version
      changed_when: false

    - name: Check kubectl cluster access
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_artifact }}"
          - get
          - nodes
      changed_when: false

    - name: Resolve local age key path
      ansible.builtin.set_fact:
        resolved_sops_age_key_file: "{{ sops_age_key_file | expanduser }}"

    - name: Check local age key file
      ansible.builtin.stat:
        path: "{{ resolved_sops_age_key_file }}"
      register: sops_age_key
      no_log: true

    - name: Fail when local age key file is missing
      ansible.builtin.fail:
        msg: "SOPS age key file not found at {{ resolved_sops_age_key_file }}. Generate it with age-keygen and store it outside the repository."
      when: not sops_age_key.stat.exists

    - name: Create Flux namespace before bootstrap
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl --kubeconfig "{{ kubernetes_kubeconfig_artifact }}" create namespace "{{ sops_age_secret_namespace }}" \
          --dry-run=client -o yaml | kubectl --kubeconfig "{{ kubernetes_kubeconfig_artifact }}" apply -f -
      args:
        executable: /bin/bash
      register: flux_namespace_apply
      changed_when: "'created' in flux_namespace_apply.stdout or 'configured' in flux_namespace_apply.stdout"

    - name: Create or update Flux SOPS age secret before bootstrap
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl --kubeconfig "{{ kubernetes_kubeconfig_artifact }}" -n "{{ sops_age_secret_namespace }}" create secret generic "{{ sops_age_secret_name }}" \
          --from-file=age.agekey="{{ resolved_sops_age_key_file }}" \
          --dry-run=client -o yaml | kubectl --kubeconfig "{{ kubernetes_kubeconfig_artifact }}" apply -f -
      args:
        executable: /bin/bash
      changed_when: "'created' in sops_age_secret_apply.stdout or 'configured' in sops_age_secret_apply.stdout"
      register: sops_age_secret_apply
      no_log: true

    - name: Verify GitHub token is available for bootstrap
      ansible.builtin.assert:
        that:
          - lookup('ansible.builtin.env', 'GITHUB_TOKEN') | length > 0
        fail_msg: "Set GITHUB_TOKEN in the local environment before running Flux bootstrap."
        success_msg: "GITHUB_TOKEN is available for Flux bootstrap."

    - name: Bootstrap Flux with GitHub deploy key authentication
      ansible.builtin.command:
        argv:
          - flux
          - bootstrap
          - github
          - "--kubeconfig={{ kubernetes_kubeconfig_artifact }}"
          - "--owner={{ flux_github_owner }}"
          - "--repository={{ flux_github_repository }}"
          - "--branch={{ flux_github_branch }}"
          - "--path={{ flux_github_path }}"
          - "--personal={{ flux_github_personal | string | lower }}"
          - "--timeout={{ flux_bootstrap_timeout }}"
      environment:
        GITHUB_TOKEN: "{{ lookup('ansible.builtin.env', 'GITHUB_TOKEN') }}"
