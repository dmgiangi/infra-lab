---
- name: Repair Flux SOPS age decryption configuration
  hosts: localhost
  gather_facts: false
  become: false

  tasks:
    - name: Resolve local age key path
      ansible.builtin.set_fact:
        resolved_sops_age_key_file: "{{ sops_age_key_file | expanduser }}"

    - name: Check local age key file
      ansible.builtin.stat:
        path: "{{ resolved_sops_age_key_file }}"
      register: sops_age_key
      no_log: true

    - name: Fail when local age key file is missing
      ansible.builtin.fail:
        msg: "SOPS age key file not found at {{ resolved_sops_age_key_file }}. Generate it with age-keygen and store it outside the repository."
      when: not sops_age_key.stat.exists

    - name: Check kubectl cluster access
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_artifact }}"
          - get
          - namespace
          - "{{ sops_age_secret_namespace }}"
      changed_when: false

    - name: Create or update Flux SOPS age secret
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl --kubeconfig "{{ kubernetes_kubeconfig_artifact }}" -n "{{ sops_age_secret_namespace }}" create secret generic "{{ sops_age_secret_name }}" \
          --from-file=age.agekey="{{ resolved_sops_age_key_file }}" \
          --dry-run=client -o yaml | kubectl --kubeconfig "{{ kubernetes_kubeconfig_artifact }}" apply -f -
      args:
        executable: /bin/bash
      changed_when: "'configured' in sops_age_secret_apply.stdout or 'created' in sops_age_secret_apply.stdout"
      register: sops_age_secret_apply
      no_log: true

    - name: Confirm SOPS age secret exists
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_artifact }}"
          - -n
          - "{{ sops_age_secret_namespace }}"
          - get
          - secret
          - "{{ sops_age_secret_name }}"
      changed_when: false

    - name: Enable SOPS decryption on the Flux root Kustomization
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_artifact }}"
          - -n
          - "{{ sops_age_secret_namespace }}"
          - patch
          - kustomization
          - flux-system
          - --type=merge
          - -p
          - '{"spec":{"decryption":{"provider":"sops","secretRef":{"name":"{{ sops_age_secret_name }}"}}}}'
      register: flux_sops_decryption_patch
      changed_when: "'patched' in flux_sops_decryption_patch.stdout"
