[global]
# Keyboard layout used by the installer and the installed system.
keyboard = "it"
# Country used by the installer.
country = "it"
# Timezone for the Proxmox server.
timezone = "Europe/Rome"
# FQDN of the Proxmox node. Change domain and hostname for the local network.
fqdn = "pve-01.lan"
# Administrative email used by Proxmox for local notifications.
mailto = "dem.ianluigi@gmail.com"
# End-of-install mode: "reboot", "poweroff", or "halt".
reboot-mode = "reboot"
# SSH public keys authorized for root.
root-ssh-keys = [
  "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPMaHDb1rtvuXbbGI5YosJr4nGi+EAM2GWIPpf/GXiff dem.gianluigi@gmail.com",
]

[network]
# Use DHCP during installation. Replace with manual configuration for static IPs.
source = "from-dhcp"

[disk-setup]
# Simple default filesystem for a single disk.
filesystem = "ext4"
# Target disk. Change for the server, for example "sda", "nvme0n1", or use a filter.
disk-list = ["sda"]

[first-boot]
# Run a script included in the ISO after the first boot.
source = "from-iso"
# Run after the system is fully booted so Proxmox services are available.
ordering = "fully-up"
