---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-configure-v3
  namespace: identity
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-configurator
        app.kubernetes.io/part-of: keycloak
    spec:
      restartPolicy: OnFailure
      containers:
        - name: configure-keycloak
          image: python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /config/configure-keycloak.py
          env:
            - name: KEYCLOAK_BASE_URL
              value: http://identity-keycloak.identity.svc.cluster.local
            - name: KEYCLOAK_ADMIN_REALM
              value: master
            - name: KEYCLOAK_ADMIN_USER
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD_FILE
              value: /var/run/keycloak-admin/admin-password
            - name: KEYCLOAK_CONFIG_FILE
              value: /config/realm-config.json
          volumeMounts:
            - name: keycloak-configurator
              mountPath: /config
              readOnly: true
            - name: keycloak-admin-credentials
              mountPath: /var/run/keycloak-admin
              readOnly: true
            - name: keycloak-idp-credentials
              mountPath: /var/run/keycloak-idp
              readOnly: true
            - name: keycloak-idp-credentials
              mountPath: /var/run/keycloak-bootstrap
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: keycloak-configurator
          configMap:
            name: keycloak-configurator
            defaultMode: 0555
        - name: keycloak-admin-credentials
          secret:
            secretName: keycloak-admin-credentials
        - name: keycloak-idp-credentials
          secret:
            secretName: keycloak-idp-credentials
            optional: true
