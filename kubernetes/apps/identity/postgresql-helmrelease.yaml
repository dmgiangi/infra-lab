---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak-postgresql
  namespace: identity
spec:
  interval: 30m
  chart:
    spec:
      chart: postgresql
      version: ">=18.0.0 <19.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 30m
  targetNamespace: identity
  install:
    createNamespace: false
  upgrade:
    cleanupOnFail: true
  values:
    architecture: standalone
    auth:
      username: keycloak
      database: keycloak
      existingSecret: keycloak-postgresql-credentials
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: password
    primary:
      persistence:
        enabled: true
        storageClass: local-path
        size: 5Gi
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-01
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
