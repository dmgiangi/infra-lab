---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: identity
spec:
  parentRefs:
    - name: kong
      namespace: ingress
      sectionName: https
  hostnames:
    - keycloak.calcifer.tech
  rules:
    - backendRefs:
        - name: keycloak
          port: 80
