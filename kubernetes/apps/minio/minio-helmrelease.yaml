---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: minio
spec:
  interval: 30m
  chart:
    spec:
      chart: minio
      version: 5.4.0
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
      interval: 30m
  targetNamespace: minio
  install:
    createNamespace: false
  upgrade:
    cleanupOnFail: true
  values:
    mode: standalone
    replicas: 1
    existingSecret: minio-root-credentials
    persistence:
      enabled: true
      storageClass: local-path
      accessMode: ReadWriteOnce
      size: 20Gi
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
    nodeSelector:
      kubernetes.io/hostname: k8s-worker-01
    service:
      type: ClusterIP
      port: "9000"
    consoleService:
      type: ClusterIP
      port: "9001"
    buckets:
      - name: lab
        policy: none
        purge: false
        versioning: false
    users: []
    svcaccts: []
