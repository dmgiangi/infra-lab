---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 1m
  path: ./config/crd
  prune: true
  sourceRef:
    kind: GitRepository
    name: gateway-api
  dependsOn:
    - name: flux-system
