---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ingress-stack
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./kubernetes/infrastructure/ingress
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: gateway-api-crds
