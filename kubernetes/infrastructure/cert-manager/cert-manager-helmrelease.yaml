---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: v1.19.3
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 30m
  targetNamespace: cert-manager
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 1
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
  values:
    crds:
      enabled: true
    prometheus:
      enabled: true
